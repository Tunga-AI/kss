steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=msommii'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyB0zPzaidQLDpNyrh7ReaiRyNhp8HOAPfc'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=msommii.firebaseapp.com'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=msommii.firebasestorage.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY=pk_test_3531fac258f9e1e40a92e942e313e046fbf49866'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=https://sales-uurxypxfoa-uc.a.run.app'
      - '--build-arg'
      - 'GEMINI_API_KEY=AIzaSyBst8FOpJiCUjkxycR5KVQYA1I7YXBa-dw'
      - '-t'
      - 'gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}:${BUILD_ID}'
      - '.'

  # 2. Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}:${BUILD_ID}']

  # 3. Deploy to Cloud Run
  # NOTE: FIREBASE_PRIVATE_KEY is passed via --update-secrets from GCP Secret Manager
  # to avoid newline-mangling issues with --set-env-vars.
  # Run once to create the secret:
  #   gcloud secrets create FIREBASE_PRIVATE_KEY --data-file=private_key.txt --project=gonogasport
  #   gcloud secrets create EMAIL_PASSWORD --data-file=- --project=gonogasport <<< "yvva uynv aqry kdmi"
  # Then grant Cloud Run SA access:
  #   gcloud secrets add-iam-policy-binding FIREBASE_PRIVATE_KEY \
  #     --member="serviceAccount:<RUN_SA>@developer.gserviceaccount.com" \
  #     --role="roles/secretmanager.secretAccessor" --project=gonogasport
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}:${BUILD_ID}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--project'
      - '${_PROJECT_ID}'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=msommii,NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyB0zPzaidQLDpNyrh7ReaiRyNhp8HOAPfc,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=msommii.firebaseapp.com,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=msommii.firebasestorage.app,NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY=pk_test_3531fac258f9e1e40a92e942e313e046fbf49866,PAYSTACK_SECRET_KEY=sk_test_caf341ef6d5594a1069c7f9c9465fb2124150e07,NEXT_PUBLIC_APP_URL=https://sales-uurxypxfoa-uc.a.run.app,APP_URL=https://sales-uurxypxfoa-uc.a.run.app,GEMINI_API_KEY=AIzaSyBst8FOpJiCUjkxycR5KVQYA1I7YXBa-dw,FIREBASE_CLIENT_EMAIL=firebase-adminsdk-fbsvc@msommii.iam.gserviceaccount.com,EMAIL_HOST=smtp.gmail.com,EMAIL_PORT=587,EMAIL_USER=hi@kss.or.ke,EMAIL_FROM_NAME=KSS Academy'
      - '--update-secrets'
      - 'FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,EMAIL_PASSWORD=EMAIL_PASSWORD:latest'

substitutions:
  _PROJECT_ID: gonogasport
  _SERVICE_NAME: sales
  _REGION: us-central1

images:
  - 'gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}:${BUILD_ID}'

options:
  logging: CLOUD_LOGGING_ONLY
